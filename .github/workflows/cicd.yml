# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compile:

    runs-on: ubuntu-latest   # shared runner provided by github (its a ubuntu machine provided by github)

    steps:
    - uses: actions/checkout@v4      # copying the code from current repo 
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn compile
  security_checks: 
     runs-on: ubuntu-latest
     needs: 
       - compile
     steps:
       - uses: actions/checkout@v4
       - name: installing Trivy
         run: | 
           sudo apt-get install -y wget apt-transport-https gnupg lsb-release
           wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
           echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
           sudo apt-get update -y
           sudo apt-get install trivy -y 
       - name: trivy fs scan
         uses: aquasecurity/trivy-action@v0.36.0
         with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret,misconfig"
          severity: "HIGH,CRITICAL"
          # exit-code: "1"
          format: 'json'
          output: "trivy-result.json"
       - name: Upload Trivy report
         uses: actions/upload-artifact@v4
         with: 
          name: trivy-json-report
          path: trivy-result.json
          retention-days: 30
             
      
