# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 


jobs:
  compile:

    runs-on: self-hosted   # shared runner provided by github (its a ubuntu machine provided by github)

    steps:
    - uses: actions/checkout@v4      # copying the code from current repo 
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: |
        sudo apt install maven -y 
        mvn compile
  security_checks: 
     runs-on: self-hosted
     needs: 
       - compile
     steps:
       - uses: actions/checkout@v4
       - name: installing Trivy
         run: | 
           sudo apt-get install -y wget apt-transport-https gnupg lsb-release
           wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
           echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
           sudo apt-get update -y
           sudo apt-get install trivy -y 
       - name: trivy fs scan
         uses: aquasecurity/trivy-action@v0.36.0
         with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret,misconfig"
          severity: "HIGH,CRITICAL"
          # exit-code: "1"
          format: 'json'
          output: "trivy-result.json"
       - name: Upload Trivy report
         uses: actions/upload-artifact@v4
         with: 
          name: trivy-json-report
          path: trivy-result.json
          retention-days: 30
       - name: git-leaks-installation 
         run: sudo apt install gitleaks -y 
       - name: git leaks scan 
         run: gitleaks detect source . -r gitleaks-report.json -f json
      
  Test: 
    runs-on: self-hosted
    needs: 
      - security_checks
    steps: 
       - uses: actions/checkout@v4 
       - name: setting up jdk-17 
         uses: actions/setup-java@v4 
         with: 
            java-version: "17"
            distribution: "temurin"
            cache: maven 
       - name: Unit test cases 
         run: mvn test 

  project-sonar-scan-test: 
    needs: 
        - Test 
    runs-on: self-hosted
    steps: 
       - uses: actions/checkout@v4 
       - name: setting up jdk-17 
         uses: actions/setup-java@v4 
         with: 
            java-version: "17"
            distribution: "temurin"
            cache: maven 
       - name: Build Project
         run: mvn package 

       - name: Upload Jar artifact
         uses: actions/upload-artifact@v4
         with: 
            name: app-jar 
            path: target/*.jar

       - uses: actions/checkout@v6
         with:
        # Disabling shallow clones is recommended for improving the relevancy of reporting
          fetch-depth: 0
       - name: SonarQube Scan
         uses: SonarSource/sonarqube-scan-action@v8.2.0 # Ex: v4.1.0 or sha1, See the latest version at https://github.com/marketplace/actions/official-sonarqube-scan
         env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
             
       - name: SonarQube Quality Gate check
         id: sonarqube-quality-gate-check
         uses: sonarsource/sonarqube-quality-gate-action@master
         with:
           pollingTimeoutSec: 600
         env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} #OPTIONAL
       - name: "SonarQube Quality Gate Status value"
         run: echo "The Quality Gate status is ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status }}"


  docker-builds: 
    runs-on: self-hosted
    needs: [ project-sonar-scan-test ]
    steps: 
        
        - uses: actions/checkout@v6
        - name: downloads the jar artifacts
          uses: actions/download-artifact@v4 
          with: 
            name: app-jar
            path: app 

        - name: Login to docker hub 
          uses: docker/login-action@v3
          with: 
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
# remember QEMU and buildx is important to build the images 
        - name: Set up QEMU
          uses: docker/setup-qemu-action@v4 

        - name: setup docker buildx 
          uses: docker/setup-buildx-action@v4
          
        - name: Build and push 
          uses: docker/build-push-action@v7 
          with: 
            context: . 
            push: true 
            tags: himanshu1236/bankapp:latest